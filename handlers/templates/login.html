<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM Router — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f1f5f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { background: #fff; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
    .brand { font-size: 20px; font-weight: 700; color: #0f172a; margin-bottom: 8px; }
    .brand span { color: #6366f1; }
    .subtitle { font-size: 14px; color: #64748b; margin-bottom: 32px; }
    label { display: block; font-size: 13px; font-weight: 500; color: #475569; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; border: 1px solid #e2e8f0; border-radius: 7px; font-size: 14px; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #6366f1; }
    .btn { width: 100%; padding: 10px; background: #6366f1; color: #fff; border: none; border-radius: 7px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn:hover { background: #4f46e5; }
    .error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; padding: 10px 14px; border-radius: 7px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="brand">⚡ <span>LLM</span> Router</div>
    <div class="subtitle">Admin Panel</div>
    {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
    <form method="POST" action="/admin/login">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" required>
      <button class="btn" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
